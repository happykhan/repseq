[workspace]
name = "repseq"
version = "0.1.0"
description = "Select representative bacterial isolates for long-read sequencing using phylogenetic + AMR diversity"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
mashtree = "*"
abricate = "*"

[pypi-dependencies]
repseq = { path = ".", editable = true }
kleborate = ">=3.0"
parnas = "*"
click = ">=8.0"
rich = ">=13.0"
pandas = ">=2.0"
scipy = "*"
scikit-learn = "*"
matplotlib = "*"
seaborn = "*"
biopython = "*"

[feature.dev.pypi-dependencies]
ruff = "*"
mypy = "*"
pytest = "*"
pytest-cov = "*"
pandas-stubs = "*"

[environments]
dev = { features = ["dev"], solve-group = "default" }
