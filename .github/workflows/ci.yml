name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.0
        with:
          environments: dev

      - name: Lint with ruff
        run: pixi run -e dev ruff check src/

      - name: Run tests
        run: pixi run -e dev pytest tests/ -q
